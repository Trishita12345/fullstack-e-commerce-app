databaseChangeLog:
  - changeSet:
      id: 001-create-orders-table
      author: trishita
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: order_status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: payment_status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: items_total_mrp
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: items_total_mrp_after_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: coupon_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: total_amount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: coupon_code
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: payment_mode
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: payment_gateway
                  type: varchar(30)
                  constraints:
                    nullable: true

              - column:
                  name: transaction_id
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: gateway_order_id
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: delivery_name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: delivery_address_details
                  type: varchar(1000)
                  constraints:
                    nullable: false

              - column:
                  name: contact_number
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createIndex:
            tableName: orders
            indexName: idx_orders_user_id
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 002-create-order-items-table
      author: trishita
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: product_item_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: product_item_thumbnail_image
                  type: varchar(500)
                  constraints:
                    nullable: false

              - column:
                  name: order_item_status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false

              - column:
                  name: sku_snapshot
                  type: varchar(255)
                  constraints:
                    nullable: true

              - column:
                  name: product_name
                  type: varchar(255)
                  constraints:
                    nullable: true

              - column:
                  name: cgst
                  type: numeric(12,2)
                  constraints:
                    nullable: true

              - column:
                  name: sgst
                  type: numeric(12,2)
                  constraints:
                    nullable: true

              - column:
                  name: unit_base_price_incl_gst
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_selling_price_incl_gst
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_coupon_discount_allocated
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_taxable_value_after_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_cgst_after_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_sgst_after_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_total_gst_after_discount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_final_amount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: total_final_amount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_order_items_order
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            tableName: order_items
            indexName: idx_order_items_order_id
            columns:
              - column:
                  name: order_id
