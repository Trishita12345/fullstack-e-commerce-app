databaseChangeLog:
  - changeSet:
      id: 001-create-orders
      author: trishita
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: order_status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: payment_status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: coupon_code
                  type: varchar(30)
                  constraints:
                    nullable: true

              - column:
                  name: payment_mode
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: payment_gateway
                  type: varchar(30)
                  constraints:
                    nullable: true

              - column:
                  name: gift_wrap_charge
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: donation
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: shipping_charge
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: total_amount
                  type: numeric(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: transaction_id
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: gateway_order_id
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: delivery_address_id
                  type: uuid
                  constraints:
                    nullable: false

  - changeSet:
      id: create-order-items-table
      author: trishita

      changes:
        - createTable:
            tableName: order_items
            columns:
              # ================= PRIMARY KEY =================
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              # ================= ORDER FK =================
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: product_item_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: order_item_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: sku_snapshot
                  type: VARCHAR(255)

              - column:
                  name: product_name
                  type: VARCHAR(255)

              # ================= PRICE SNAPSHOT =================
              - column:
                  name: unit_base_price_incl_gst
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit_selling_price_incl_gst
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              # ================= TAX BREAKUP =================
              - column:
                  name: taxable_value_before_discount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: discount_allocated
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: taxable_value_after_discount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: gst_after_discount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: final_item_amount_paid
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              # ================= AUDIT FIELDS =================
              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        # ================= FOREIGN KEY =================
        - addForeignKeyConstraint:
            constraintName: fk_order_items_order
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 003-add-indexes-for-performance
      author: trishita
      changes:
        - createIndex:
            tableName: orders
            indexName: idx_orders_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_order_items_product_item
            tableName: order_items
            columns:
              - column:
                  name: product_item_id

        - createIndex:
            indexName: idx_order_items_status
            tableName: order_items
            columns:
              - column:
                  name: order_item_status
