server:
  port: 8084
  address: 127.0.0.1

spring:
  application:
    name: order-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5435/order_db
    username: user
    password: pass123

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db-changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.e_commerce.common.model.event.InventoryReserveEvent

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/order-service/v3/api-docs/swagger-config
    url: /api/order-service/v3/api-docs
gateway:
  base-url: https://api.loomandlume.shop/api/order-service
  api-description: Swagger UI Documentation for Order Service

feign:
  client:
    product-service:
      url: http://localhost:8081
    cart-service:
      url: http://localhost:8082
    offer-service:
      url: http://localhost:8085
    payment-service:
      url: http://localhost:8086
    profile-service:
      url: http://localhost:8083

s3:
  public-url: https://loom-and-lume.s3.ap-south-1.amazonaws.com

   
    
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        minimumNumberOfCalls: 5

      offerService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
      
      cartService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  retry:
    instances:
      productService:
        maxAttempts: 3
        waitDuration: 1s

      offerService:
        maxAttempts: 2

  timelimiter:
    instances:
      productService:
        timeoutDuration: 10s

