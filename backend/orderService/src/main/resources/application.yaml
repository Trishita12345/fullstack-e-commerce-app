server:
  port: 8084
spring:
  application:
    name: orderService
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5435/order_db
    username: user
    password: pass123
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db-changelog-master.yaml

logging:
  level:
    org:
      springframework:
        security: debug
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/order-service/v3/api-docs/swagger-config
    url: /api/order-service/v3/api-docs

gateway:
  base-url: http://localhost:8080/api/order-service
  api-description: Swagger UI Documentation for order Service

feign:
  client:
    product-service:
      url: http://localhost:8081
    cart-service:
      url: http://localhost:8082
