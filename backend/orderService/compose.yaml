services:
  order_service:
    image: "postgres:16"
    container_name: order_service_postgres_container
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: order_db
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - order_data:/var/lib/postgresql/data

volumes:
  order_data:
