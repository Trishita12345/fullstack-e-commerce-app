services:
  payment_service:
    image: "postgres:16"
    container_name: payment_service_postgres_container
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: payment_db
    ports:
      - "5437:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data

volumes:
  payment_data:
