databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: trishita

      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: CHAR(36)
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_payments
                    nullable: false

              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: payment_status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: payment_method
                  type: VARCHAR(30)

              - column:
                  name: gateway
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: transaction_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: gateway_payment_id
                  type: VARCHAR(150)

              - column:
                  name: gateway_order_id
                  type: VARCHAR(150)

              # AuditEntity fields
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_payments_order_id
            tableName: payments
            columns:
              - column:
                  name: order_id

        - createIndex:
            indexName: idx_payments_user_id
            tableName: payments
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_payments_transaction_id
            tableName: payments
            unique: true
            columns:
              - column:
                  name: transaction_id
