              #         "applicableUserType": ["NEW", "EXISTING"]
              #       }

        - insert:
            tableName: offers
            columns:
              - column: { name: coupon_code, value: SAVE15 }
              - column: { name: discount_percent, valueNumeric: 15 }
              - column: { name: min_purchase_amount, valueNumeric: 1499 }
