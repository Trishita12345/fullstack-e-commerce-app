databaseChangeLog:
  - changeSet:
      id: create-gst-tax-slab-table
      author: trishita
      changes:
        - createTable:
            tableName: gst_tax_slab
            columns:
              - column:
                  name: hsn_code
                  type: VARCHAR(10)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: gst_rate
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(255)
