server:
  port: 8082
  address: 127.0.0.1
spring:
  application:
    name: cart-service
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/cart_db
    username: user
    password: pass123
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db-changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

    consumer:
      group-id: cart-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.e_commerce.common.model.event.OrderFulfilledEvent


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/cart-service/v3/api-docs/swagger-config
    url: /api/cart-service/v3/api-docs

gateway:
  base-url: https://api.loomandlume.shop/api/cart-service
  api-description: Swagger UI Documentation for Cart Service

   
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:}, traceId=%X{traceId:-}, spanId=%X{spanId:-}] [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:}, traceId=%X{traceId:-}, spanId=%X{spanId:-}] [%thread] %logger{36} - %msg%n"
  level:
    org:
      springframework:
        security: debug
        cloud:
          gateway: debug
  file:
    name: app/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
     
management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

