services:
  auth_service:
    image: 'postgres:16'
    container_name: auth_service_postgres_container
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d auth_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: auth_db
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  auth_redis_service:
    image: 'redis:7'
    container_name: auth_service_redis_container
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - auth_data:/data


volumes:
  auth_data:
