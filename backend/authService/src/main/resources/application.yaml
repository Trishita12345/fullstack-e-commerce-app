server:
  port: 8088
  address: 127.0.0.1
spring:
  application:
    name: authService
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5438/auth_db
    username: user
    password: pass123
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db-changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.e_commerce.common.model.event.OrderFulfilledEvent

logging:
  level:
    org:
      springframework:
        security: debug
  file:
    name: app/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/auth-service/v3/api-docs/swagger-config
    url: /api/auth-service/v3/api-docs

gateway:
  base-url: https://api.loomandlume.shop/api/auth-service
  api-description: Swagger UI Documentation for auth Service

feign:
  client:
    profile-service:
      url: http://localhost:8083

app:
  otp:
    whitelist-enabled: ${WHITELIST_ENABLED:false}
    whitelist-phones: ${WHITELIST_PHONES:}
    whitelist-otp: ${WHITELIST_OTP:}