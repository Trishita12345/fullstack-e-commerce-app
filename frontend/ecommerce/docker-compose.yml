version: "3.8"

services:
  auth-service-postgres:
    image: postgres:16
    container_name: postgres-container
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: testdb
    ports:
      - "127.0.0.1:5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
